<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-label="Dashboard modules and interactions">
  <defs>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #111827; }
      .label { font: 700 16px Arial, sans-serif; fill: #0f172a; }
      .text { font: 13px Arial, sans-serif; fill: #1f2937; }
      .panel { fill: #ffffff; stroke: #334155; stroke-width: 1.7; rx: 12; }
      .chip { fill: #eef2ff; stroke: #818cf8; stroke-width: 1.3; rx: 9; }
      .arrow { stroke: #2563eb; stroke-width: 2.6; fill: none; marker-end: url(#arr); }
    </style>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#2563eb"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="720" fill="#ffffff"/>
  <text x="600" y="44" text-anchor="middle" class="title">Figure 3: Dashboard Modules and Operations</text>

  <rect x="54" y="88" width="1092" height="582" class="panel"/>
  <rect x="74" y="108" width="220" height="542" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2" rx="10"/>
  <text x="184" y="138" text-anchor="middle" class="label">Navigation</text>
  <rect x="94" y="156" width="180" height="36" class="chip"/><text x="184" y="178" text-anchor="middle" class="text">Dashboard</text>
  <rect x="94" y="202" width="180" height="36" class="chip"/><text x="184" y="224" text-anchor="middle" class="text">Potholes</text>
  <rect x="94" y="248" width="180" height="36" class="chip"/><text x="184" y="270" text-anchor="middle" class="text">Map View</text>
  <rect x="94" y="294" width="180" height="36" class="chip"/><text x="184" y="316" text-anchor="middle" class="text">Vehicles</text>
  <rect x="94" y="340" width="180" height="36" class="chip"/><text x="184" y="362" text-anchor="middle" class="text">Users</text>
  <rect x="94" y="386" width="180" height="36" class="chip"/><text x="184" y="408" text-anchor="middle" class="text">Settings</text>

  <rect x="320" y="108" width="806" height="140" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2" rx="10"/>
  <text x="345" y="134" class="label">Overview Module</text>
  <rect x="344" y="148" width="170" height="78" class="chip"/><text x="429" y="176" text-anchor="middle" class="text">Total / Today</text><text x="429" y="198" text-anchor="middle" class="text">Stat Cards</text>
  <rect x="530" y="148" width="170" height="78" class="chip"/><text x="615" y="176" text-anchor="middle" class="text">Daily Trend</text><text x="615" y="198" text-anchor="middle" class="text">Chart</text>
  <rect x="716" y="148" width="170" height="78" class="chip"/><text x="801" y="176" text-anchor="middle" class="text">By-Status</text><text x="801" y="198" text-anchor="middle" class="text">Chart</text>
  <rect x="902" y="148" width="200" height="78" class="chip"/><text x="1002" y="176" text-anchor="middle" class="text">Recent Potholes</text><text x="1002" y="198" text-anchor="middle" class="text">Quick Links</text>

  <rect x="320" y="266" width="392" height="190" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2" rx="10"/>
  <text x="344" y="292" class="label">Pothole Management</text>
  <rect x="344" y="306" width="344" height="34" class="chip"/><text x="516" y="328" text-anchor="middle" class="text">Filters: status, severity, page</text>
  <rect x="344" y="348" width="344" height="34" class="chip"/><text x="516" y="370" text-anchor="middle" class="text">Bulk actions: verify, repair, false-positive, delete</text>
  <rect x="344" y="390" width="344" height="34" class="chip"/><text x="516" y="412" text-anchor="middle" class="text">CSV export for operations</text>

  <rect x="734" y="266" width="392" height="190" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2" rx="10"/>
  <text x="758" y="292" class="label">Map and Detail</text>
  <rect x="758" y="306" width="344" height="34" class="chip"/><text x="930" y="328" text-anchor="middle" class="text">All points loaded + fit bounds</text>
  <rect x="758" y="348" width="344" height="34" class="chip"/><text x="930" y="370" text-anchor="middle" class="text">Optional heatmap intensity overlay</text>
  <rect x="758" y="390" width="344" height="34" class="chip"/><text x="930" y="412" text-anchor="middle" class="text">Detail page: image, status, severity</text>

  <rect x="320" y="474" width="806" height="176" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2" rx="10"/>
  <text x="344" y="500" class="label">Administration and API Integration</text>
  <rect x="344" y="514" width="240" height="34" class="chip"/><text x="464" y="536" text-anchor="middle" class="text">Vehicle CRUD + active status</text>
  <rect x="596" y="514" width="240" height="34" class="chip"/><text x="716" y="536" text-anchor="middle" class="text">User CRUD (admin role)</text>
  <rect x="848" y="514" width="254" height="34" class="chip"/><text x="975" y="536" text-anchor="middle" class="text">Token refresh and auth guards</text>
  <rect x="344" y="558" width="758" height="34" class="chip"/><text x="723" y="580" text-anchor="middle" class="text">Axios API client -> /api/auth, /api/potholes, /api/vehicles, /api/users, /api/stats</text>

  <path d="M274 220 L320 220" class="arrow"/>
  <path d="M274 266 L320 338" class="arrow"/>
  <path d="M274 310 L734 338" class="arrow"/>
  <path d="M274 354 L320 560" class="arrow"/>
</svg>
