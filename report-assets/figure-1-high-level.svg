<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-label="High-level smart pothole system architecture">
  <defs>
    <style>
      .title { font: 700 32px Arial, sans-serif; fill: #0f172a; }
      .label { font: 700 18px Arial, sans-serif; fill: #1e293b; }
      .text { font: 14px Arial, sans-serif; fill: #1f2937; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 12; }
      .sub { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; rx: 10; }
      .arrow { stroke: #0ea5e9; stroke-width: 3; fill: none; marker-end: url(#m); }
      .tag { fill: #dbeafe; stroke: #3b82f6; stroke-width: 1; rx: 8; }
    </style>
    <marker id="m" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#0ea5e9"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="680" fill="#ffffff"/>
  <text x="600" y="48" text-anchor="middle" class="title">Figure 1: High-Level System Architecture</text>

  <rect x="60" y="100" width="300" height="460" class="box"/>
  <text x="210" y="132" text-anchor="middle" class="label">Mobile App</text>
  <rect x="90" y="160" width="240" height="68" class="sub"/>
  <text x="210" y="198" text-anchor="middle" class="text">Detection + GPS + Upload Queue</text>
  <rect x="90" y="248" width="240" height="68" class="sub"/>
  <text x="210" y="286" text-anchor="middle" class="text">Multipart Report to API</text>
  <rect x="90" y="336" width="240" height="68" class="sub"/>
  <text x="210" y="374" text-anchor="middle" class="text">vehicleId, lat/lng, confidence, image</text>

  <rect x="450" y="100" width="320" height="460" class="box"/>
  <text x="610" y="132" text-anchor="middle" class="label">Backend API (ASP.NET Core 8)</text>
  <rect x="480" y="160" width="260" height="56" class="sub"/>
  <text x="610" y="193" text-anchor="middle" class="text">JWT Auth + Role Guards</text>
  <rect x="480" y="232" width="260" height="56" class="sub"/>
  <text x="610" y="265" text-anchor="middle" class="text">Deduplication (15m radius)</text>
  <rect x="480" y="304" width="260" height="56" class="sub"/>
  <text x="610" y="337" text-anchor="middle" class="text">CRUD + Bulk + CSV + Stats</text>
  <rect x="480" y="376" width="260" height="56" class="sub"/>
  <text x="610" y="409" text-anchor="middle" class="text">SignalR NewPothole Event</text>

  <rect x="860" y="100" width="280" height="220" class="box"/>
  <text x="1000" y="132" text-anchor="middle" class="label">PostgreSQL + PostGIS</text>
  <rect x="890" y="165" width="220" height="48" class="sub"/>
  <text x="1000" y="194" text-anchor="middle" class="text">users</text>
  <rect x="890" y="222" width="220" height="48" class="sub"/>
  <text x="1000" y="251" text-anchor="middle" class="text">vehicles</text>
  <rect x="890" y="279" width="220" height="48" class="sub"/>
  <text x="1000" y="308" text-anchor="middle" class="text">potholes (geography point)</text>

  <rect x="860" y="340" width="280" height="220" class="box"/>
  <text x="1000" y="372" text-anchor="middle" class="label">React Dashboard</text>
  <rect x="890" y="400" width="220" height="44" class="sub"/>
  <text x="1000" y="427" text-anchor="middle" class="text">Map + List + Detail</text>
  <rect x="890" y="452" width="220" height="44" class="sub"/>
  <text x="1000" y="479" text-anchor="middle" class="text">Vehicles + Users</text>
  <rect x="890" y="504" width="220" height="44" class="sub"/>
  <text x="1000" y="531" text-anchor="middle" class="text">Overview + Analytics</text>

  <path d="M330 280 L450 280" class="arrow"/>
  <path d="M770 210 L860 210" class="arrow"/>
  <path d="M770 420 L860 420" class="arrow"/>
  <path d="M860 460 L770 460" class="arrow"/>

  <rect x="390" y="246" width="50" height="22" class="tag"/>
  <text x="415" y="261" text-anchor="middle" class="text">HTTPS</text>
  <rect x="794" y="390" width="58" height="22" class="tag"/>
  <text x="823" y="405" text-anchor="middle" class="text">REST</text>
  <rect x="794" y="444" width="68" height="22" class="tag"/>
  <text x="828" y="459" text-anchor="middle" class="text">SignalR</text>
</svg>
